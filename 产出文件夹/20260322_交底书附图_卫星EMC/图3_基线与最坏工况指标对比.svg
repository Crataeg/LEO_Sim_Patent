  <line x1="940" y1="690" x2="1420" y2="690" stroke="#475569" stroke-width="3"/>
  <line x1="940" y1="230" x2="940" y2="690" stroke="#475569" stroke-width="3"/>
  <text x="910" y="695" class="axis">0</text>
