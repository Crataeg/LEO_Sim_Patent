  <line x1="940" y1="230" x2="1420" y2="230" stroke="#e5e7eb" stroke-width="2"/>

  <rect x="990" y="690" width="55" height="0" fill="#60a5fa"/>
  <rect x="1065" y="609" width="55" height="81" fill="#f97316"/>
  <text x="1055" y="725" text-anchor="middle" class="axis">DL</text>
  <text x="1018" y="680" text-anchor="middle" class="value">0.00</text>
  <text x="1093" y="599" text-anchor="middle" class="value">4.42</text>

  <rect x="1170" y="690" width="55" height="0" fill="#60a5fa"/>
  <rect x="1245" y="309" width="55" height="381" fill="#f97316"/>
  <text x="1235" y="725" text-anchor="middle" class="axis">UL</text>
  <text x="1198" y="680" text-anchor="middle" class="value">0.00</text>
  <text x="1273" y="299" text-anchor="middle" class="value">20.73</text>

  <rect x="1350" y="690" width="55" height="0" fill="#60a5fa"/>
  <rect x="1425" y="292" width="55" height="398" fill="#f97316"/>
  <text x="1415" y="725" text-anchor="middle" class="axis">E2E</text>
  <text x="1378" y="680" text-anchor="middle" class="value">0.00</text>
  <text x="1453" y="282" text-anchor="middle" class="value">21.65</text>

  <rect x="580" y="805" width="26" height="26" fill="#60a5fa"/>
  <text x="620" y="825" class="legend">基线工况</text>
  <rect x="760" y="805" width="26" height="26" fill="#f97316"/>
  <text x="800" y="825" class="legend">最坏工况</text>

  <text x="800" y="875" text-anchor="middle" class="axis">说明：基于现有平台导出的 summary_v7 结果绘制。最坏工况下，上行链路和端到端指标退化更明显，说明该方法能够自动揭示真实瓶颈。</text>
</svg>
