  <line x1="180" y1="580" x2="660" y2="580" stroke="#e5e7eb" stroke-width="2"/>
  <line x1="180" y1="470" x2="660" y2="470" stroke="#e5e7eb" stroke-width="2"/>
  <line x1="180" y1="360" x2="660" y2="360" stroke="#e5e7eb" stroke-width="2"/>
