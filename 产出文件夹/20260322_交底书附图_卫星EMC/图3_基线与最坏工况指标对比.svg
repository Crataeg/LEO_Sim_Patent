<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="920" viewBox="0 0 1600 920">
  <defs>
    <style>
      .title { font: 700 34px 'Microsoft YaHei', 'SimSun', sans-serif; fill: #1f2937; }
      .axis { font: 18px 'Microsoft YaHei', 'SimSun', sans-serif; fill: #374151; }
      .label { font: 700 24px 'Microsoft YaHei', 'SimSun', sans-serif; fill: #111827; }
      .value { font: 18px 'Microsoft YaHei', 'SimSun', sans-serif; fill: #111827; }
      .legend { font: 20px 'Microsoft YaHei', 'SimSun', sans-serif; fill: #111827; }
    </style>
  </defs>

  <rect width="1600" height="920" fill="#f8fafc"/>
  <text x="800" y="60" text-anchor="middle" class="title">图3 基线与最坏工况指标对比图</text>

  <rect x="100" y="120" width="640" height="650" rx="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="3"/>
